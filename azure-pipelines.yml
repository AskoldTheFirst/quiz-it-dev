trigger:
  branches:
    include:
      - main
  paths:
    include:
      - back-end/*
      - back-end/**

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: 'Release'
  apiProject: 'back-end/KramarDev.Quiz.WebAPI/KramarDev.Quiz.WebAPI.csproj'
  testProjects: 'back-end/QuizIT.Tests/QuizIT.Tests.csproj'

steps:
- task: UseDotNet@2
  displayName: 'Install .NET SDK'
  inputs:
    packageType: 'sdk'
    version: '10.x'

- task: DotNetCoreCLI@2
  displayName: 'Restore'
  inputs:
    command: 'restore'
    projects: '$(apiProject)'

- task: DotNetCoreCLI@2
  displayName: 'Build'
  inputs:
    command: 'build'
    projects: '$(apiProject)'
    arguments: '--configuration $(buildConfiguration) --no-restore'

- task: DotNetCoreCLI@2
  displayName: 'Run unit tests'
  inputs:
    command: 'test'
    projects: '$(testProjects)'
    publishTestResults: false
    arguments: >
      --configuration $(buildConfiguration)
      --logger "trx;LogFileName=test-results.trx"
      --results-directory $(Agent.TempDirectory)/test-results

- task: PublishTestResults@2
  displayName: 'Publish test results'
  condition: succeededOrFailed()
  inputs:
    testResultsFormat: 'VSTest'
    testResultsFiles: '$(Agent.TempDirectory)/test-results/**/*.trx'
    failTaskOnFailedTests: true
    testRunTitle: 'QuizIT Backend Tests'

- task: DotNetCoreCLI@2
  displayName: 'Publish API'
  inputs:
    command: 'publish'
    publishWebProjects: false
    projects: '$(apiProject)'
    arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/api --no-build'
    zipAfterPublish: true

- task: AzureWebApp@1
  displayName: 'Deploy API to Azure Web App'
  inputs:
    azureSubscription: 'quiz-it-connection'
    appType: 'webApp'
    appName: 'quiz-it-api'
    package: '$(Build.ArtifactStagingDirectory)/api/**/*.zip'
    deploymentMethod: 'zipDeploy'